nodejs:
  # Don't modify below here
  image: ${IMAGE_NAME}
  ingressHost: ${SERVICE_FQDN}
  keyVaults:
    opal:
      secrets:
        - app-insights-connection-string
        - launch-darkly-client-id
  environment:
    REDIS_CONNECTION_STRING: redis://${SERVICE_NAME}-redis-master:6379
    OPAL_API_URL: ${DEV_OPAL_RM_SERVICE_URL}
    OPAL_RM_SERVICE_API_URL: ${DEV_OPAL_RM_SERVICE_URL}
    OPAL_USER_SERVICE_API_URL: https://opal-user-service.staging.platform.hmcts.net
    FRONTEND_HOSTNAME: https://${SERVICE_FQDN}
    FEATURES_LAUNCH_DARKLY_ENABLED: false
    FEATURES_SSO_ENABLED: false
    FEATURES_APP_INSIGHTS_ENABLED: false
    FEATURES_IP_LOGGING_ENABLED: true
opal-rm-service:
  enabled: ${DEV_ENABLE_OPAL_RM_SERVICE}
  java:
    releaseNameOverride: ${SERVICE_NAME}-rm-service
    image: "hmctsprod.azurecr.io/opal/rm-service:${DEV_OPAL_RM_SERVICE_IMAGE_SUFFIX}"
    ingressHost: "opal-rm-frontend-pr-${CHANGE_ID}-rm-service.dev.platform.hmcts.net"
    imagePullPolicy: Always
    devmemoryRequests: "1Gi"
    devcpuRequests: "250m"
    devmemoryLimits: "2Gi"
    devcpuLimits: "2500m"
    secrets:
      SERVICEBUS_SHARED_ACCESS_KEY:
        secretRef: opal-sb-dev
        key: primaryKey
      SERVICEBUS_CONNECTION_STRING:
        secretRef: opal-sb-dev
        key: connectionString
    global:
      enableKeyVaults: true
    keyVaults:
      opal:
        secrets:
          - name: app-insights-connection-string
            alias: app-insights-connection-string
          - name: AzureADTenantId
            alias: AAD_TENANT_ID
          - name: AzureADClientId
            alias: AAD_CLIENT_ID
          - name: AzureADClientSecret
            alias: AAD_CLIENT_SECRET
          - name: OpalTestUserPassword
            alias: OPAL_TEST_USER_PASSWORD
          - name: opalLegacyJCDEGatewayUsername
            alias: OPAL_LEGACY_GATEWAY_USERNAME
          - name: opalLegacyJCDEGatewayPassword
            alias: OPAL_LEGACY_GATEWAY_PASSWORD
    environment:
      OPAL_RM_DB_HOST: "{{ .Release.Name }}-postgresql"
      OPAL_RM_DB_NAME: opal
      OPAL_RM_DB_USERNAME: opal
      OPAL_RM_DB_PASSWORD: opal
      OPAL_RM_DB_OPTIONS: "?stringtype=unspecified"
      OPAL_RM_DB_PORT: 5432
      RUN_DB_MIGRATION_ON_STARTUP: true
      OPAL_FRONTEND_URL: "https://${SERVICE_FQDN}"
      OPAL_USER_SERVICE_API_URL: https://opal-user-service.staging.platform.hmcts.net
      FLYWAY_LOCATIONS: classpath:db/migration/allEnvs, classpath:db/migration/devOnly
      APPLICATIONINSIGHTS_ROLE_NAME: "opal-rm-frontend-pr-${CHANGE_ID}-rm-service"
      DEFAULT_APP_MODE: ${DEV_DEFAULT_APP_MODE}
      OPAL_LEGACY_GATEWAY_URL: ${DEV_OPAL_LEGACY_GATEWAY_URL}
      OPAL_LEGACY_GATEWAY_USERNAME: ${OPAL_LEGACY_GATEWAY_USERNAME}
      OPAL_LEGACY_GATEWAY_PASSWORD: ${OPAL_LEGACY_GATEWAY_PASSWORD}
      LAUNCH_DARKLY_ENABLED: false
      SERVICEBUS_LOGGING_PDPL_QUEUE_NAME: "{{ .Release.Name}}-servicebus-logging-pdpl"
      SERVICEBUS_LOGGING_PDPL_PROTOCOL: amqps
postgresql:
  enabled: ${DEV_ENABLE_OPAL_RM_SERVICE}
  image:
    tag: "17.5.0"
  auth:
    username: opal
    password: opal
    database: opal
  primary:
    persistence:
      enabled: false
    resourcesPreset: small
servicebus:
  enabled: ${DEV_ENABLE_OPAL_RM_SERVICE}
  releaseNameOverride: ${SERVICE_NAME}-servicebus
  resourceGroup: "opal-aso-dev-rg"
  sbNamespace: "opal-servicebus-dev"
  setup:
    queues:
      - name: "logging-pdpl"
redis:
  enabled: true
  architecture: standalone
  master:
    persistence:
      enabled: false
  auth:
    enabled: false
